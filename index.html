<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CWO Ionity" />
  <title>Call Wreck Order · Ionity</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <span class="logo">⬡</span>
    <h1>CWO <span class="accent">Ionity</span></h1>
    <p class="tagline">Cross-device call recorder</p>
  </header>

  <!-- Storage setup banner -->
  <section id="storage-banner" class="banner banner--warning hidden">
    <p id="storage-msg"></p>
    <button id="btn-pick-dir" class="btn btn--sm">Grant storage access</button>
  </section>

  <!-- Active recording indicator -->
  <div id="rec-indicator" class="rec-indicator hidden">
    <span class="pulse"></span> Recording…
  </div>

  <!-- Main controls -->
  <main class="controls">
    <button id="btn-record" class="btn btn--primary btn--lg" disabled>
      <span class="icon">⏺</span>
      <span>Start Recording</span>
    </button>
    <button id="btn-stop" class="btn btn--danger btn--lg hidden">
      <span class="icon">⏹</span>
      <span>Stop &amp; Save</span>
    </button>
  </main>

  <!-- Save path display -->
  <section class="save-path-info">
    <p>Recordings saved to:</p>
    <code id="save-path-display">/.Ionity/CWO/&lt;date&gt;_&lt;id&gt;.webm</code>
  </section>

  <!-- Recordings list -->
  <section class="recordings-section">
    <h2>Saved Recordings</h2>
    <p id="recordings-empty" class="empty-hint">No recordings yet. Grant storage access and start recording.</p>
    <ul id="recordings-list" class="recordings-list"></ul>
  </section>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/storage.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }
  </script>
</body>
</html>
