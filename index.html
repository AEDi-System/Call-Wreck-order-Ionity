<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ionity – Nodes Living</title>
    <style>
      /* ── Reset & base ────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d14;
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      }

      /* ── Full-screen canvas ──────────────────────────── */
      #canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      /* ── Loading indicator ───────────────────────────── */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d0d14;
        z-index: 10;
        transition: opacity 0.6s ease;
      }

      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 4px solid rgba(112, 44, 145, 0.25);
        border-top-color: #FF006C;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading ring, hidden once the canvas starts animating -->
    <div id="loader" aria-label="Loading">
      <div class="loader-ring"></div>
    </div>

    <!-- The main animated canvas -->
    <canvas id="canvas" aria-label="Ionity Nodes Living visualisation"></canvas>

    <script type="module">
      // Hide loader once the module is ready
      import("./main.js").then(() => {
        const loader = document.getElementById("loader");
        if (loader) loader.classList.add("hidden");
      });
    </script>
  </body>
</html>
